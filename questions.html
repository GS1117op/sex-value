    const categoryLabels = {
      communication: 'コミュニケーション',
      timing: 'タイミング',
      lead: 'リード',
      knowledge: '知識',
      experience: '経験',
      body: '肉体',
    };

    const catColors = {
      communication: '#a78bfa',
      timing: '#f472b6',
      lead: '#fb7185',
      knowledge: '#60a5fa',
      experience: '#fb923c',
      body: '#34d399',
    };

    const gender = sessionStorage.getItem('sv_gender') || 'male';
    const questions = gender === 'female' ? femaleQuestions : maleQuestions;
    const TOTAL = questions.length;

    let current = 0;
    let scores = [];
    let selectedScore = null;

    function render() {
      const q = questions[current];
      document.getElementById('q-counter').textContent = `Q${current + 1} / ${TOTAL}`;
      document.getElementById('q-category').textContent = categoryLabels[q.category] || q.category;
      document.getElementById('q-category').style.color = catColors[q.category] || '#fff';
      document.getElementById('q-number').textContent = `QUESTION ${String(current + 1).padStart(2, '0')}`;
      document.getElementById('q-text').textContent = q.text;
      document.getElementById('progress-fill').style.width = `${((current + 1) / TOTAL) * 100}%`;

      const choicesEl = document.getElementById('choices');
      choicesEl.innerHTML = '';
      q.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-label">${c.label}</span><span>${c.text}</span>`;
        btn.addEventListener('click', () => selectChoice(i, c.score, btn));
        choicesEl.appendChild(btn);
      });

      selectedScore = null;
      const nextBtn = document.getElementById('btn-next');
      nextBtn.classList.remove('active');
      nextBtn.textContent = current === TOTAL - 1 ? '結果を見る 🎉' : '次の質問へ →';

      const card = document.getElementById('q-card');
      card.classList.remove('fade-in');
      void card.offsetWidth;
      card.classList.add('fade-in');
    }

    function selectChoice(index, score, clickedBtn) {
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      clickedBtn.classList.add('selected');
      selectedScore = score;
      document.getElementById('btn-next').classList.add('active');
    }

    function nextQuestion() {
      if (selectedScore === null) return;
      scores.push(selectedScore);

      if (current < TOTAL - 1) {
        current++;
        render();
      } else {
        const total = scores.reduce((a, b) => a + b, 0);
        const maxPossible = questions.reduce((acc, q) => acc + Math.max(...q.choices.map(c => c.score)), 0);

        const catScores = {};
        questions.forEach((q, i) => {
          const maxS = Math.max(...q.choices.map(c => c.score));
          if (!catScores[q.category]) {
            catScores[q.category] = { score: 0, max: 0, label: categoryLabels[q.category] || q.category };
          }
          catScores[q.category].score += scores[i];
          catScores[q.category].max += maxS;
        });

        sessionStorage.setItem('sv_total', total);
        sessionStorage.setItem('sv_max', maxPossible);
        sessionStorage.setItem('sv_catScores', JSON.stringify(catScores));
        window.location.href = 'result.html';
      }
    }

    render();
