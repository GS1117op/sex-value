  <script>
    const ranks = [
      { min: 75, name: '🏆 SEXの神', label: '偏差値75以上', desc: '圧倒的なSEX力の持ち主。知識・経験・肉体・属性のすべてがトップクラスです。パートナーを至福の境地へ導く天才的な素養を持つ、100人に2〜3人しかいない真のSEXマスター。' },
      { min: 65, name: '⭐ エリートラバー', label: '偏差値65〜74', desc: '上位15%に入る高い総合力を誇ります。4カテゴリいずれも水準以上で、パートナーの満足度は非常に高いはず。さらに磨けば神の域も目指せます。' },
      { min: 55, name: '💫 デキるプレイヤー', label: '偏差値55〜64', desc: '平均を大きく上回る実力の持ち主。経験・肉体・知識のバランスが取れており、安定したクオリティを提供できます。あと一歩で上位層へ。' },
      { min: 45, name: '✨ アベレージ', label: '偏差値45〜54', desc: 'ちょうど平均レベルのSEX力です。基本は押さえているものの、まだ伸びしろがたくさんあります。弱いカテゴリを集中強化するとスコアが大きく伸びます。' },
      { min: 35, name: '📚 修行中', label: '偏差値35〜44', desc: '平均以下ではありますが、気づいているだけで大きなアドバンテージ。カテゴリ別スコアを確認して、弱点を把握するところから始めましょう。' },
      { min: 0,  name: '🌱 ビギナー', label: '偏差値34以下', desc: 'まだ旅の始まり。焦らなくて大丈夫です。SEXは知識と経験とコミュニケーションで確実に上達します。今日から少しずつ学んでいきましょう！' },
    ];

    const catColors = {
      '知識': 'linear-gradient(90deg, #a78bfa, #7c3aed)',
      '経験': 'linear-gradient(90deg, #f472b6, #db2777)',
      '肉体': 'linear-gradient(90deg, #fb923c, #ea580c)',
      '属性': 'linear-gradient(90deg, #34d399, #059669)',
    };

    const catOrder = ['知識', '経験', '肉体', '属性'];

    function calcHensachi(total, max) {
      const ratio = total / max;
      const base = 20 + ratio * 60;
      const noise = (Math.random() * 6) - 3;
      return Math.round(Math.min(82, Math.max(18, base + noise)));
    }

    function init() {
      if (!sessionStorage.getItem('sv_total')) {
        window.location.href = 'index.html';
        return;
      }

      const total = parseInt(sessionStorage.getItem('sv_total'));
      const max   = parseInt(sessionStorage.getItem('sv_max'));
      const catScores = JSON.parse(sessionStorage.getItem('sv_catScores') || '{}');

      const hensachi = calcHensachi(total, max);
      const rank = ranks.find(r => hensachi >= r.min);

      // Animate counter
      const valueEl = document.getElementById('hensachi-value');
      let count = 0;
      const timer = setInterval(() => {
        count += Math.ceil(hensachi / 40);
        if (count >= hensachi) { count = hensachi; clearInterval(timer); }
        valueEl.textContent = count;
      }, 1200 / 40);

      document.getElementById('hensachi-rank').textContent = rank.label;

      // Gauge (20=0%, 80=100%)
      const pct = Math.min(100, Math.max(0, (hensachi - 20) / 60 * 100));
      setTimeout(() => {
        document.getElementById('gauge-fill').style.width = pct + '%';
        document.getElementById('gauge-pointer').style.left = pct + '%';
      }, 300);

      document.getElementById('rank-name').textContent = rank.name;
      document.getElementById('rank-desc').textContent = rank.desc;

      // Category bars
      const barsEl = document.getElementById('score-bars');
      barsEl.innerHTML = '';
      catOrder.forEach(cat => {
        const val = catScores[cat];
        if (!val) return;
        const pctCat = val.max > 0 ? Math.round((val.score / val.max) * 100) : 0;
        const item = document.createElement('div');
        item.className = 'score-bar-item';
        item.innerHTML = `
          <div class="score-bar-label">
            <span>${cat}</span>
            <span>${pctCat}%</span>
          </div>
          <div class="score-bar-track">
            <div class="score-bar-fill" style="width: 0%; background: ${catColors[cat]}"></div>
          </div>
        `;
        barsEl.appendChild(item);
        setTimeout(() => {
          item.querySelector('.score-bar-fill').style.width = pctCat + '%';
        }, 600);
      });

      // Share
      document.getElementById('share-btn').addEventListener('click', () => {
        const gender = sessionStorage.getItem('sv_gender') === 'female' ? '女性' : '男性';
        const text = `【${gender}】私のSEX偏差値は ${hensachi} でした！${rank.name}\n#SEX偏差値測定`;
        window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`);
      });
    }

    init();
  </script>
